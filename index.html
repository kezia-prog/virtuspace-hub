<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VirtuSpace Daily Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #F1F0E8; }
    body { font-family: 'DM Sans', system-ui, sans-serif; color: #33343A; }
    button { font-family: inherit; cursor: pointer; }
    input, select, textarea { font-family: inherit; font-size: 15px; }
    input:focus, select:focus, button:focus-visible { outline: 2px solid #3629B5; outline-offset: 1px; }
    a { color: inherit; }
    @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
    @media print {
      body * { visibility: hidden; }
      .print-area, .print-area * { visibility: visible !important; }
      .print-area { position: absolute !important; left: 0 !important; top: 0 !important; width: 100% !important; margin: 0 !important; box-shadow: none !important; border-radius: 0 !important; }
      .no-print { display: none !important; }
    }
  </style>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react" src="/app.jsx"></script>
</body>
</html>
